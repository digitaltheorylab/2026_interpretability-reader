[workspace]
authors = ["Tyler Shoemaker <69219954+t-shoemaker@users.noreply.github.com>"]
channels = ["conda-forge"]
name = "2026_dtl_lm-interpretability"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
build = "jupyter book start --execute"
clean = "jupyter book clean ."

[dependencies]
python = ">=3.13,<3.15"

[pypi-dependencies]
ipykernel = ">=7.2.0, <8"
numpy = ">=2.0,<2.4"
transformers = ">=5.9.0, <6"
torch = ">=2.11.0, <3"
evaluate = ">=0.4.6, <0.5"
scikit-learn = ">=1.9.0, <2"
seaborn = ">=0.13.2, <0.14"
jupyter-book = ">=2.1.5, <3"
accelerate = ">=1.14.0, <2"
